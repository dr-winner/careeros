<svg width="64" height="64" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Person Profile - Left -->
  <g>
    <circle cx="70" cy="65" r="14" fill="url(#gradientFav)" opacity="0.95" />
    <path d="M 56 82 Q 56 85 70 85 Q 84 85 84 82" stroke="url(#gradientFav)" stroke-width="3" fill="none" stroke-linecap="round" />
    <g opacity="0.8">
      <rect x="56" y="95" width="28" height="3" rx="1.5" fill="url(#gradientFav)" />
      <rect x="56" y="103" width="20" height="3" rx="1.5" fill="url(#gradientFav)" opacity="0.8" />
      <rect x="56" y="111" width="24" height="3" rx="1.5" fill="url(#gradientFav)" opacity="0.6" />
    </g>
  </g>

  <!-- Job Opportunity - Right -->
  <g>
    <rect x="166" y="50" width="32" height="28" rx="3" fill="none" stroke="url(#gradientFav)" stroke-width="2.5" opacity="0.95" />
    <line x1="182" y1="50" x2="182" y2="78" stroke="url(#gradientFav)" stroke-width="2" opacity="0.7" />
    <g opacity="0.85">
      <circle cx="177" cy="95" r="2.5" fill="url(#gradientFav)" />
      <circle cx="177" cy="105" r="2.5" fill="url(#gradientFav)" opacity="0.8" />
      <circle cx="177" cy="115" r="2.5" fill="url(#gradientFav)" opacity="0.6" />
    </g>
  </g>

  <!-- Smart Matching - Center -->
  <g>
    <path d="M 88 100 Q 120 80 152 100" stroke="url(#gradientFav)" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="3,2" />
    <path d="M 88 120 Q 120 140 152 120" stroke="url(#gradientFav)" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="3,2" />
    <circle cx="105" cy="110" r="3" fill="url(#gradientFav)" opacity="0.9" />
    <circle cx="120" cy="100" r="3" fill="url(#gradientFav)" opacity="0.8" />
    <circle cx="135" cy="110" r="3" fill="url(#gradientFav)" opacity="0.9" />
    <circle cx="120" cy="120" r="4" fill="url(#gradientFav)" opacity="1" />
    <circle cx="120" cy="120" r="5" fill="none" stroke="url(#gradientFav)" stroke-width="1.5" opacity="0.7" />
  </g>

  <!-- Fit Score - Bottom -->
  <g>
    <rect x="60" y="145" width="120" height="6" rx="3" fill="url(#gradientFav)" opacity="0.2" />
    <rect x="60" y="145" width="102" height="6" rx="3" fill="url(#gradientFav)" opacity="0.9" />
    <g transform="translate(175, 155)">
      <path d="M 0 0 L 4 5 L 10 -2" stroke="url(#gradientFav)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>